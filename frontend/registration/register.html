<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="{{ url_for('frontend', path='registration/register.css') }}" rel="stylesheet">
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@latest/bundles/datastar.js">
    </script>
</head>

<body>

    <div class="login-card" data-signals="{username: '', email: '', password: '', isStudent:false}"
        data-computed:is-student="$isTrainer != true">

        <h1>Sign Up</h1>

        <form data-on:submit="@post('/auth/sign-up')">

            <input type="text" data-bind:username placeholder="Username:" required>

            <input type="email" data-bind:email placeholder="Email:" required>

            <input type="password" data-bind:password placeholder="Password:" required>

            <label class="checkbox">
                <input type="checkbox" data-bind:is-trainer>
                <span>I am a trainer</span>
            </label>

            <button>Create Account</button>

        </form>
        <div class="error-box" data-show="$error" data-text="$error" style="display: none">
        </div>
    </div>

</body>

</html>
