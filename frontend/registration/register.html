<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="{{ url_for('frontend', path='registration/register.css') }}" rel="stylesheet">
</head>
<body>

<div class="login-card">

    <h1>Sign Up</h1>

    <form action="/register" method="post">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <label class="checkbox">
            <input
                type="checkbox"
                name="is_student"
            >
            <span>I am a student</span>
        </label>

        <button type="submit">Create Account</button>

    </form>

</div>

</body>
</html>
