<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="{{ url_for('frontend', path='login/login.css') }}" rel="stylesheet">
    <script
    type="module"
    src="https://cdn.jsdelivr.net/gh/starfederation/datastar@latest/bundles/datastar.js">
</script>
</head>
<body>

<div class="login-card">

    <h1>Sign In</h1>

    <form>

        <input 
            type="text" 
            name="username"
            placeholder="Username:" 
            required
        >

        <input 
            type="password" 
            name="password"
            placeholder="Password:" 
            required
        >

        <button data-on:click="@post('/auth/login, {contentType: 'form'})">Login</button>

    </form>

    <span class="signup">
        Don't have an account?
        <a href="/auth/sign-up">Sign up</a>
    </span>

</div>

</body>
</html>
