<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="{{ url_for('frontend', path='login/login.css') }}" rel="stylesheet">
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@latest/bundles/datastar.js">
    </script>
</head>

<body>
    {% include 'event_loader.html' %}
    <div class="login-card" data-signals="{username: '', password: '', error: ''}">

        <h1>Sign In</h1>

        <form data-on:submit="@post('/auth/login')">

            <input type="text" data-bind:username placeholder="Username:" required>

            <input type="password" data-bind:password placeholder="Password:" required>

            <button>Login</button>

        </form>

        <div class="error-box" data-show="$error" data-text="$error">
        </div>

        <span class="signup">
            Don't have an account?
            <a href="/auth/sign-up">Sign up</a>
        </span>

    </div>

</body>

</html>
